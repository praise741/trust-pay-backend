services:
  - type: web
    name: trustpay-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 120 backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PAYAZA_MOCK_MODE
        value: "True"
      - key: PAYAZA_BASE_URL
        value: https://api.payaza.africa
      - key: PAYAZA_PUBLIC_KEY
        sync: false
      - key: PAYAZA_TENANT_ID
        value: test
      - key: PAYAZA_SECRET
        sync: false
      - key: PAYAZA_TRANSACTION_PIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: trustpay-db
          property: connectionString
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
